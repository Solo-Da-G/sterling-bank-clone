<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterling-Bank</title>
    <!-- FontAwesome Library -->
    <link rel="stylesheet" href="./fontawesome/css/all.css">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="./newproject/bootstrap/css/bootstrap.min.css">
    <!-- Custom Main Styles -->
    <link rel="stylesheet" href="./css/main-style.css">
</head>
<body>
    <main id="wrapper">
        <header>
            <div class="log">
                <img src="./assets/images/sterlinglogo-whats.jpeg" alt="Sterling Logo" width="70px" class="img2" title="sterling-logo">
                <span class="span-image"><strong><em>Sterling</em></strong></span>
            </div>
            <div class="log2">
                <button class="button1" aria-label="Secure Lock"><i class="fas fa-lock"></i></button>
                <button class="button2">Internet Banking</button>
            </div>
        </header>

        <!-- Fixed Side Navigation -->
        <nav class="group-all d-none d-lg-block" aria-label="Quick Links">
            <ul>
                <li class="side-fixed">
                    <a href="#">
                        <img src="./assets/images/briefcase2.png" alt="Manage Account" width="30px">
                        <span class="side-span"><strong>Manage Account</strong></span>
                    </a>
                </li>
                <li class="side-fixed">
                    <a href="#">
                        <img src="./assets/images/user-id.jpg" alt="Open Account" width="30px">
                        <span class="side-span"><strong>Open Account</strong></span>
                    </a>
                </li>
                <li class="side-fixed">
                    <a href="#">
                        <img src="./assets/images/loan-logo.webp" alt="Get A Loan" width="30px">
                        <span class="side-span"><strong>Get A Loan</strong></span>
                    </a>
                </li>
                <li class="side-fixed">
                    <a href="#">
                        <img src="./assets/images/credit-card.png" alt="Get A Credit Card" width="30px">
                        <span class="side-span"><strong>Get A Credit Card</strong></span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="container-fluid p-0 overflow-hidden">
            <div class="row g-0 general-background w-100 m-0">
                <!-- Personal Section -->
                <section class="col-md-12 col-lg-4 p-0">
                    <a href="./assets/sterling-bank.html" class="background-panel background-pic1 w-100 d-flex text-decoration-none">
                        <h1>Personal</h1>
                    </a>
                </section>

                <!-- Business Section -->
                <section class="col-md-12 col-lg-4 p-0">
                    <a href="#" class="background-panel background-pic2 w-100 d-flex text-decoration-none">
                        <h1>Business</h1>
                    </a>
                </section>

                <!-- Alternative Section -->
                <section class="col-md-12 col-lg-4 p-0">
                    <a href="#" class="background-panel background-pic3 w-100 d-flex text-decoration-none">
                        <h1>Alternative</h1>
                    </a>
                </section>
            </div>
        </div>
    </main>
</body>
</html>
